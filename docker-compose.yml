version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: snapfood_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-snapfood_db}
      POSTGRES_USER: ${DB_USER:-snapfood_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-snapfood_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - snapfood_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-snapfood_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: snapfood_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - snapfood_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  django:
    build: .
    container_name: snapfood_django
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snapfood_network

  celery:
    build: .
    container_name: snapfood_celery
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - redis
      - postgres
    networks:
      - snapfood_network

  celery-beat:
    build: .
    container_name: snapfood_celery_beat
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - redis
      - postgres
    networks:
      - snapfood_network

  nginx:
    image: nginx:alpine
    container_name: snapfood_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/staticfiles:ro
      - media_volume:/media:ro
    depends_on:
      - django
    networks:
      - snapfood_network

volumes:
  postgres_data:
  redis_data:
  media_volume:
  static_volume:

networks:
  snapfood_network:
    driver: bridge
    