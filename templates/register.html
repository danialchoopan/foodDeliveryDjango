{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Register - DanialFood" %}{% endblock %}

{% block content %}
<div class="card auth-card">
    <h2>{% trans "Join DanialFood" %}</h2>

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>{% trans "Username" %}</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>{% trans "Email" %}</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>{% trans "Password" %}</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label>{% trans "Account Type" %}</label>
            <select name="role" class="form-control">
                <option value="customer">{% trans "Customer" %}</option>
                <option value="restaurant_owner">{% trans "Restaurant Owner" %}</option>
            </select>
        </div>
        <button type="submit" class="btn btn-block btn-lg">{% trans "Register" %}</button>
    </form>

    <div class="auth-footer">
        {% trans "Already a member?" %} <a href="{% url 'web_login' %}">{% trans "Login" %}</a>
    </div>
</div>
{% endblock %}
