{% extends 'base.html' %}

{% block title %}ورود به دانیال فود{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 5rem auto;" class="card">
    <h2 style="text-align: center; color: var(--primary);">ورود به سیستم</h2>

    {% if messages %}
        {% for message in messages %}
            <div style="background: #f8d7da; color: #721c24; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; text-align: center;">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">نام کاربری</label>
            <input type="text" name="username" style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;" required>
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem;">رمز عبور</label>
            <input type="password" name="password" style="width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px;" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; padding: 0.75rem;">ورود</button>
    </form>
    <div style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
        کاربر ندارید؟ <a href="/register" style="color: var(--primary);">ثبت نام کنید</a>
    </div>
</div>
{% endblock %}
